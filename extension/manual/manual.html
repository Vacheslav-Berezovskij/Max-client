<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAXSEC Manual Crypto Panel</title>
    <style>
      body { font-family: sans-serif; margin: 16px; max-width: 860px; }
      h1 { margin-bottom: 8px; }
      .meta { display: grid; grid-template-columns: repeat(3,minmax(160px,1fr)); gap: 12px; margin-bottom: 14px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #fafafa; }
      .label { font-size: 12px; color: #555; margin-bottom: 4px; }
      .value { font-weight: 600; word-break: break-all; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      textarea { width: 100%; min-height: 180px; resize: vertical; font-family: ui-monospace, monospace; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
      button { padding: 8px 12px; cursor: pointer; }
      #status { margin-top: 8px; color: #2563eb; min-height: 20px; }
    </style>
  </head>
  <body>
    <h1>MAXSEC Manual Crypto Panel</h1>
    <p>Local-only encryption/decryption sandbox. Nothing is sent anywhere.</p>

    <section class="meta">
      <div class="card">
        <div class="label">Current mode</div>
        <div id="mode" class="value">OFF</div>
      </div>
      <div class="card">
        <div class="label">Verification status</div>
        <div id="verifyStatus" class="value">unverified</div>
      </div>
      <div class="card">
        <div class="label">Fingerprint</div>
        <div id="fingerprint" class="value">—</div>
      </div>
    </section>

    <section class="grid">
      <div>
        <div class="label">Plaintext input</div>
        <textarea id="plaintext" placeholder="Type plaintext here..."></textarea>
      </div>
      <div>
        <div class="label">Ciphertext input/output (JSON)</div>
        <textarea id="ciphertext" placeholder='{"iv":"...","ciphertext":"..."}'></textarea>
      </div>
    </section>

    <div class="actions">
      <button id="encrypt">Encrypt</button>
      <button id="decrypt">Decrypt</button>
      <button id="copyCipher">Copy encrypted text</button>
      <button id="copyPlain">Copy decrypted text</button>
    </div>

    <div id="status"></div>

    <script type="module" src="./manual.js"></script>
  </body>
</html>
